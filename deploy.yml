---
- name: Deploy Maven Artifact
  hosts: localhost
  become: yes

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: /home/shiva/deployment
        state: directory
        mode: '0755'

    - name: Copy the artifact to the deployment directory
      ansible.builtin.copy:
        src: /mnt/c/Users/shiva/.jenkins/workspace/HelloMaven-CI/target/HelloMaven-1.0-SNAPSHOT.jar
        dest: /home/shiva/deployment/HelloMaven.jar
        remote_src: yes